<style>
:root{
  --bg:#080808; --bg2:#0f0f0d; --glass:rgba(255,255,255,0.05);
  --amber:#c8601a; --amber2:#e8893a; --amber3:#f0aa60;
  --neon-border:rgba(232,137,58,0.25);
  --text:#f0ece6; --muted:#9a8870; --muted2:#5a4830;
  --border:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
/* 32px rhythm */
.r8{padding-top:2rem;padding-bottom:2rem;}
.r16{padding-top:4rem;padding-bottom:4rem;}
.r24{padding-top:6rem;padding-bottom:6rem;}
/* Glass */
.glass{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--neon-border);}
.glass-dark{background:rgba(0,0,0,0.4);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--neon-border);}
/* Neon glow */
.neon-amber{box-shadow:0 0 24px rgba(232,137,58,0.15),inset 0 0 24px rgba(232,137,58,0.03);}
/* Fonts */
.bebas{font-family:'Bebas Neue',sans-serif;}
.mono{font-family:'DM Mono',monospace;}
/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes marqueeScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes spinCCW{to{transform:rotate(-360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes scanUp{0%{transform:translateY(100%);opacity:0.7}100%{transform:translateY(-100%);opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.anim-fade-up{animation:fadeUp 0.65s ease forwards;}
.anim-fade{animation:fadeIn 0.5s ease forwards;}
/* Page transition */
.page-enter{animation:fadeUp 0.4s ease forwards;}
/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--amber);border-radius:2px;}
</style>
</head>

// ── HOOKS ──────────────────────────────────────────────────────────
function useReveal(threshold=0.1){
  const ref = useRef(null);
  const [visible,setVisible] = useState(false);
  useEffect(()=>{
    const obs = new IntersectionObserver(([e])=>{
      if(e.isIntersecting){setVisible(true);obs.disconnect();}
    },{threshold});
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[]);
  return [ref,visible];
}

function RevealBox({children,delay=0,className=""}){
  const [ref,vis] = useReveal();
  return (
    <div ref={ref} className={className} style={{
      opacity: vis?1:0, transform: vis?"translateY(0)":"translateY(28px)",
      transition:`opacity 0.65s ease ${delay}ms, transform 0.65s ease ${delay}ms`
    }}>{children}</div>
  );
}

// ── FOOTER BAR — Avatar Popup ─────────────────────────────────────
function FooterBar({avatarOpen,setAvatarOpen,page,navigate}){
  const popupRef = useRef(null);
  const [imgHover,setImgHover] = useState(false);

  // Close on outside click or Escape
  useEffect(()=>{
    const h=(e)=>{ if(avatarOpen && popupRef.current && !popupRef.current.contains(e.target)) setAvatarOpen(false); };
    const k=(e)=>{ if(e.key==="Escape") setAvatarOpen(false); };
    document.addEventListener("mousedown",h);
    document.addEventListener("keydown",k);
    return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("keydown",k);};
  },[avatarOpen]);

  return(
    <div style={{
      position:"fixed",bottom:0,left:0,right:0,zIndex:200,
      background:"rgba(8,8,8,0.95)",backdropFilter:"blur(20px)",
      borderTop:"1px solid rgba(255,255,255,0.07)",
      padding:"14px 48px",
      display:"flex",alignItems:"center",justifyContent:"space-between"
    }}>
      {/* Left: brand + certs */}
      <div style={{display:"flex",alignItems:"center",gap:20}}>
        <span className="bebas" style={{fontSize:"0.9rem",letterSpacing:"3px",color:"#9a8870"}}>WALEED HASSAN</span>
        <div style={{display:"flex",gap:10}}>
          {["ISTQB","CAST™","CBAP™","15+ YRS"].map(c=>(
            <span key={c} className="mono" style={{fontSize:"0.6rem",padding:"3px 9px",border:"1px solid rgba(200,96,26,0.2)",color:"#8a7050",letterSpacing:"1px"}}>{c}</span>
          ))}
        </div>
      </div>

      {/* Center: nav */}
      <div style={{display:"flex",gap:8}}>
        {[["profile","Profile"],["career","Experience"]].map(([p,l])=>(
          <button key={p} onClick={()=>navigate(p)} style={{
            fontFamily:"'Inter',sans-serif",fontWeight:500,fontSize:"0.82rem",
            color:page===p?"#e8893a":"rgba(240,236,230,0.45)",
            background:"none",border:"none",cursor:"pointer",padding:"6px 14px",
            transition:"color 0.2s"
          }}>{l}</button>
        ))}
      </div>

      {/* Right: Avatar button + popup */}
      <div style={{position:"relative"}} ref={popupRef}>
        <button onClick={()=>setAvatarOpen(o=>!o)} style={{
          width:42,height:42,borderRadius:"50%",overflow:"hidden",
          border:`2px solid ${avatarOpen?"#e8893a":"rgba(200,96,26,0.35)"}`,
          cursor:"pointer",padding:0,transition:"border-color 0.3s",
          boxShadow:avatarOpen?"0 0 16px rgba(200,96,26,0.5)":"none"
        }}
          onMouseEnter={()=>setImgHover(true)} onMouseLeave={()=>setImgHover(false)}>
          <img src={PHOTO} alt="WH" style={{
            width:"100%",height:"100%",objectFit:"cover",objectPosition:"top",
            filter:imgHover||avatarOpen?"grayscale(0%) brightness(1)":"grayscale(100%) brightness(0.85)",
            transition:"filter 0.5s ease"
          }}/>
        </button>

        {/* Avatar Popup — spec: 320px, 32px padding, glass-neon */}
        {avatarOpen && (
          <div className="glass-dark neon-amber" style={{
            position:"absolute",bottom:52,right:0,
            width:320,padding:32,
            animation:"fadeUp 0.3s ease both",
            boxShadow:"0 0 40px rgba(200,96,26,0.15),0 24px 72px rgba(0,0,0,0.8)"

            {/* Header */}
            <div style={{display:"flex",gap:16,alignItems:"center",marginBottom:24}}>
